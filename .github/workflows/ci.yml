name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Generate missing visual baselines
        run: |
          if [ ! -f "tests/e2e/09-visual.spec.ts-snapshots/landing-chromium-linux.png" ]; then
            echo "No baseline found — generating initial snapshots"
            npx playwright test tests/e2e/09-visual.spec.ts --update-snapshots || true
          fi

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Commit new visual baselines
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/09-visual.spec.ts-snapshots/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: add linux visual regression baselines [skip ci]"
            git push
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/report
