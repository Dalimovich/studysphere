<!-- STUDIP DASHBOARD -->
<div id="studipDash" style="position:fixed;inset:0;z-index:210;background:var(--dp-bg);overflow-y:auto;opacity:0;pointer-events:none">
  <div class="blobs" style="position:fixed">
    <div class="blob blob-1"></div>
    <div class="blob blob-2" style="background:#4CC9F0"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4" style="background:#06D6A0"></div>
  </div>
  <div style="position:relative;z-index:10;max-width:820px;margin:0 auto;padding:48px 24px 80px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-family:'Fredoka One',cursive;font-size:2rem;background:linear-gradient(135deg,#c084fc,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(192,132,252,.3))">📚 Stud.IP</div>
      <button id="studipBack" style="background:var(--studip-back-bg);border:1px solid var(--studip-back-border);border-radius:20px;padding:8px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;color:var(--studip-back-color);cursor:pointer">← Portal</button>
    </div>
    <p style="color:var(--studip-subtitle);font-weight:700;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:40px">TU Braunschweig · Your courses &amp; materials</p>
    <div style="margin-bottom:32px">
      <div class="sd-section-label">📚 Subjects</div>
      <div style="margin-bottom:14px;position:relative;max-width:220px">
        <button class="sem-btn sd-sem-btn" id="sdSemBtn">
          <span class="sem-btn-l"><span class="sem-dot" id="sdSemDot" style="background:#06D6A0"></span><span id="sdSemLabel">WS 2025/26</span></span>
          <span class="sem-chev" id="sdSemChev">▼</span>
        </button>
        <div class="sem-dd sd-sem-dd" id="sdSemDD">
          <div class="sem-opt sel" data-sid="ws2526" data-col="#06D6A0">🟢 WS 2025/26</div>
          <div class="sem-opt" data-sid="ss25" data-col="#9B5DE5">📁 SS 2025</div>
          <div class="sem-opt" data-sid="ws2425" data-col="#FF6FB7">📁 WS 2024/25</div>
          <div class="sem-opt" data-sid="ss24" data-col="#4CC9F0">📁 SS 2024</div>
          <div class="sem-opt" data-sid="ws2324" data-col="#FF6B35">📁 WS 2023/24</div>
        </div>
      </div>
      <div id="sdCourseList" class="sd-course-grid"></div>
    </div>
    <div class="sd-two-col">
      <div>
        <div class="sd-section-label">🗓️ Timetable</div>
        <div id="sdTTList" class="sd-glass-card"></div>
      </div>
      <div>
        <div class="sd-section-label">✉️ Mails</div>
        <div id="sdMailList" class="sd-glass-card"></div>
      </div>
    </div>
  </div>
</div>
