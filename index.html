<!-- AUTH + SESSION ROUTING — runs synchronously before supabase.js and loader.js -->
<script>
// ── 1. SESSION ROUTING ────────────────────────────────────────────────────
(function() {
  var loggedIn = false;

  // Already inside the app in THIS tab/session.
  try { loggedIn = sessionStorage.getItem('ss_logged_in') === 'true'; } catch(e) {}

  // Supabase OAuth redirect back — hash contains #access_token=...
  if (!loggedIn && window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
    loggedIn = true;
  }

  // Supabase email verification / PKCE callback — query contains token or code
  if (!loggedIn) {
    try {
      var qp = new URLSearchParams(window.location.search);
      if (qp.get('token') || qp.get('token_hash') || qp.get('confirmation_token') || qp.get('code')) {
        loggedIn = true;
      }
    } catch(e) {}
  }

  // Landing page CTA clicked — boot the full app shell first.
  if (!loggedIn) {
    try {
      if (sessionStorage.getItem('ss_force_app') === 'true') {
        sessionStorage.removeItem('ss_force_app');
        loggedIn = true;
      }
    } catch(e) {}
  }

  // Persistent login — sb_token saved from a previous "Stay signed in" session.
  // Load the full app so supabase.js can verify the token and enter the dashboard.
  if (!loggedIn) {
    try { if (localStorage.getItem('sb_token')) loggedIn = true; } catch(e) {}
  }

  window._ssIsLoggedIn = loggedIn;
})();

// ── 2. POST-LOGIN HOOK ────────────────────────────────────────────────────
window._onLoginSuccess = function() {
  try {
    sessionStorage.setItem('ss_logged_in', 'true');
    sessionStorage.setItem('ss_last_active', Date.now());
  } catch(e) {}
  window.location.reload();
};

// ── 3. GOOGLE AUTH CONSTANTS ──────────────────────────────────────────────
var _GCID  = '345518014023-dsgciaeuvm9nak002avlrpdnikldusuq.apps.googleusercontent.com';
var _SUPA  = 'https://wprfkjeiawxlcnitsfdr.supabase.co';
var _SAKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwcmZramVpYXd4bGNuaXRzZmRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjAyMzUsImV4cCI6MjA4OTc5NjIzNX0.LbJKG8J_jd2oKYAmQg0ycb-LBnQM1ItlseOLMT_24jc';

var _REDIRECT = (function() {
  var loc = window.location;
  var path = loc.pathname;
  if (!path.match(/\.html?$/i)) path = path.replace(/\/?$/, '/index.html');
  return loc.origin + path;
})();

function _oauthFallback() {
  window.location.href = _SUPA + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(_REDIRECT);
}

// ── 4. GOOGLE ONE TAP / OAUTH HANDLER ────────────────────────────────────
function _handleGoogleCredential(response) {
  fetch(_SUPA + '/auth/v1/token?grant_type=id_token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': _SAKEY },
    body: JSON.stringify({
      provider: 'google',
      id_token: response.credential,
      gotrue_meta_security: {}
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d && d.access_token) {
      localStorage.setItem('sb_token', d.access_token);
      if (d.refresh_token) localStorage.setItem('sb_refresh', d.refresh_token);
      var alreadyIn = false;
      try { alreadyIn = sessionStorage.getItem('ss_logged_in') === 'true'; } catch(e) {}
      if (!alreadyIn) window._onLoginSuccess();
    } else {
      console.warn('[Auth] id_token exchange failed:', d && (d.error || d.msg));
      _oauthFallback();
    }
  })
  .catch(function(err) {
    console.warn('[Auth] id_token fetch error, falling back to OAuth:', err);
    _oauthFallback();
  });
}

// ── 5. GOOGLE ONE TAP INIT ────────────────────────────────────────────────
function _initOneTap() {
  // Create a fixed container so the prompt renders top-right on the landing page
  var parent = document.getElementById('ss-one-tap-parent');
  if (!parent) {
    parent = document.createElement('div');
    parent.id = 'ss-one-tap-parent';
    parent.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;';
    document.body.appendChild(parent);
  }

  google.accounts.id.initialize({
    client_id: _GCID,
    callback: _handleGoogleCredential,
    context: 'signin',
    cancel_on_tap_outside: false,
    auto_select: false,
    itp_support: true,
    prompt_parent_id: 'ss-one-tap-parent'
  });

  // Only auto-prompt on the landing page (not when the full app is already loaded)
  if (!window._ssIsLoggedIn) {
    google.accounts.id.prompt(function(notification) {
      if (notification.isNotDisplayed()) {
        console.warn('[OneTap] not displayed:', notification.getNotDisplayedReason());
        window._oneTapBlocked = true;
      } else if (notification.isSkippedMoment()) {
        console.log('[OneTap] skipped:', notification.getSkippedReason());
        window._oneTapBlocked = true;
      } else if (notification.isDismissedMoment()) {
        var reason = notification.getDismissedReason();
        console.log('[OneTap] dismissed:', reason);
        if (reason !== 'credential_returned') window._oneTapBlocked = true;
      }
    });
  }
}

// ── 6. MAIN AUTH ENTRY POINT ──────────────────────────────────────────────
window._googleAuth = function() {
  // Inside the full app shell / auth modal → use OAuth directly.
  if (document.getElementById('authModal')) {
    _oauthFallback();
    return;
  }

  // One Tap already known to be blocked → open auth modal directly.
  if (window._oneTapBlocked) {
    try {
      sessionStorage.setItem('ss_force_app', 'true');
      sessionStorage.setItem('ss_show_auth', 'true');
    } catch(e) {}
    window.location.reload();
    return;
  }

  // Landing page: try One Tap prompt; if it can't show, fall back to auth modal.
  var _showAuthModal = function() {
    try {
      sessionStorage.setItem('ss_force_app', 'true');
      sessionStorage.setItem('ss_show_auth', 'true');
    } catch(e) {}
    window.location.reload();
  };

  var _tryOneTap = function() {
    google.accounts.id.prompt(function(notification) {
      if (
        notification.isNotDisplayed() ||
        notification.isSkippedMoment() ||
        (notification.isDismissedMoment() && notification.getDismissedReason() !== 'credential_returned')
      ) {
        window._oneTapBlocked = true;
        _showAuthModal();
      }
    });
  };

  if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
    _tryOneTap();
    return;
  }

  // GSI not loaded yet — wait up to 3 s then fall back
  var _attempts = 0;
  var _wait = setInterval(function() {
    _attempts++;
    if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
      clearInterval(_wait);
      _tryOneTap();
    } else if (_attempts >= 30) {
      clearInterval(_wait);
      _showAuthModal();
    }
  }, 100);
};

// ── 7. GSI LOAD WATCHER ───────────────────────────────────────────────────
var _gsiTimer = setInterval(function() {
  if (typeof google !== 'undefined' && google.accounts) {
    clearInterval(_gsiTimer);
    _initOneTap();
  }
}, 100);
</script>

<!-- Activity tracker: keeps ss_last_active fresh for the 30-min session timeout -->
<script>
(function() {
  ['mousemove', 'keydown', 'click', 'touchstart', 'scroll'].forEach(function(ev) {
    document.addEventListener(ev, function() {
      try { sessionStorage.setItem('ss_last_active', Date.now()); } catch(e) {}
    }, { passive: true });
  });
})();
</script>
